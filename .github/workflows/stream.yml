name: StreamLoop 24/7 Live Stream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache video file
        id: cache-video
        uses: actions/cache@v4
        with:
          path: stream.mp4
          key: streamloop-video-v1

      - name: Download video
        if: steps.cache-video.outputs.cache-hit != 'true'
        run: |
          wget -O stream.mp4 "${{ secrets.VIDEO_URL }}"
          ls -lh stream.mp4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Start streaming
        run: |
          ffmpeg -re -stream_loop -1 -i stream.mp4 \
            -c:v libx264 -preset veryfast -b:v 4500k -maxrate 4500k -bufsize 2*4500k \
            -pix_fmt yuv420p -g 60 -c:a aac -b:a 160k -ar 44100 \
            -f flv "${RTMP_URL}/${STREAM_KEY}"
        env:
          RTMP_URL: ${{ secrets.RTMP_URL }}
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
